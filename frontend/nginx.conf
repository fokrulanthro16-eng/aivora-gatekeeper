server {
    listen       80;
    server_name  _;

    # Serve static assets from Vite build output
    root  /usr/share/nginx/html;
    index index.html;

    # Aggressive cache on hashed asset bundles (Vite adds content-hash suffix)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # index.html must never be cached so new deploys take effect immediately
    location = /index.html {
        add_header  Cache-Control "no-store, no-cache, must-revalidate";
        try_files   $uri =404;
    }

    # All other paths fall back to index.html (React client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* to the backend (when running behind a reverse proxy that
    # serves both frontend and backend under the same domain)
    # Uncomment if deploying with a shared ingress:
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    # }

    # Gzip text assets
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml;
    gzip_min_length 1024;
}
